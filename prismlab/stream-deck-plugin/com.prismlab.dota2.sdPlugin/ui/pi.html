<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prismlab Dota 2 Settings</title>
  <style>
    body { font-family: Arial, sans-serif; background: #2d2d2d; color: #ccc; padding: 12px; margin: 0; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: #aaa; }
    input { width: 100%; box-sizing: border-box; padding: 6px; background: #1a1a1a; border: 1px solid #444; color: #eee; border-radius: 3px; font-size: 12px; }
    button { margin-top: 8px; padding: 6px 12px; background: #00d4ff; color: #000; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
    button:hover { background: #00b8e0; }
    .hint { font-size: 10px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <label for="backendUrl">Prismlab Backend WebSocket URL</label>
  <input type="text" id="backendUrl" placeholder="ws://localhost:8420/ws" />
  <p class="hint">Default: ws://localhost:8420/ws<br>Unraid: ws://100.78.161.13:8420/ws</p>
  <button id="saveBtn">Save</button>

  <script>
    const $SD = window.$SD;

    // Load current value when PI opens
    $SD.onConnected(() => {
      $SD.getGlobalSettings();
    });

    $SD.onDidReceiveGlobalSettings(({ payload }) => {
      const url = payload.settings?.backendUrl ?? "ws://localhost:8420/ws";
      document.getElementById("backendUrl").value = url;
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const url = document.getElementById("backendUrl").value.trim() || "ws://localhost:8420/ws";
      $SD.setGlobalSettings({ backendUrl: url });
    });
  </script>
</body>
</html>
